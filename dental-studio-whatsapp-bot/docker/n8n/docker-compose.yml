# n8n — self-hosted workflow automation engine
# Docs: https://docs.n8n.io/hosting/

services:
  n8n:
    image: n8nio/n8n:1.44.1
    container_name: n8n
    restart: unless-stopped
    networks:
      - traefik_public   # Traefik needs to reach n8n to route HTTPS traffic
      - internal         # n8n needs to reach PostgreSQL and Redis
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      # --- Host / URL ---
      N8N_HOST: "${N8N_HOST}"
      N8N_PROTOCOL: https
      WEBHOOK_URL: "${WEBHOOK_URL}"

      # --- Database ---
      # Persistent PostgreSQL backend — do not use SQLite in production
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: "<your_n8n_db_password>"   # replace with a strong password

      # --- Encryption ---
      # All credentials stored in the DB are encrypted with this key.
      # Losing this key means losing access to all stored credentials.
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY}"

      # --- Execution settings ---
      EXECUTIONS_PROCESS: main
      # Keep execution history for 30 days; tune down if disk space is a concern
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "720"   # hours (30 days)

      # --- Timezone ---
      GENERIC_TIMEZONE: America/Sao_Paulo

      # --- Basic auth for the n8n UI (optional but recommended) ---
      # N8N_BASIC_AUTH_ACTIVE: "true"
      # N8N_BASIC_AUTH_USER: admin
      # N8N_BASIC_AUTH_PASSWORD: "<your_n8n_ui_password>"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.yourdomain.com`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: n8n_postgres
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: "<your_n8n_db_password>"   # must match DB_POSTGRESDB_PASSWORD above
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port intentionally not exposed — n8n reaches it via the internal Docker network

volumes:
  n8n_data:
  postgres_data:

networks:
  traefik_public:
    external: true   # shared with the evolution stack; create once: docker network create traefik_public
  internal:
    driver: bridge
